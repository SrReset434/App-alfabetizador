<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A definir</title>
    <link rel="stylesheet" href="desg-fs4.css">
    <!--Fase 6/nv4/rima-->
    <style>
        .botão{
            font-size: 24px;
            text-align: center;
        }

    </style>
</head>
<body>
    <header>
        <h2>Qual a última sílaba desse objeto?</h2>
    </header>
        <div id="caixa0">
            <div id="caixa">
                    <div id="botões">
                        <div class="botão POS">
                            <p class="letra">POS</p>
                        </div>
                        <div class="botão PES">
                            <p class="letra">PES</p>
                        </div>
                        <div class="botão PIS">
                            <p class="letra">PIS</p>
                        </div>
                        <div class="botão PAS">
                            <p class="letra">PAS</p>
                        </div>
                    </div>
            
                    <div id="correção">
                        <div id = "avançar"><p>Verificar</p></div>
                        <div id = "gv"><p>Verificar</p></div>
                        <div id="go"><p id="texto1">Parabéns!</p></div>
                        <div id="td"><p id="texto2">Tente de novo!</p></div>
                    </div>
        </div>
                <img src="../../imagens/lápis.png" alt="lápis" id="imagem">
    </div>
    <script>
        const botao = window.document.querySelectorAll('.botão')
        const avancar = window.document.getElementById('avançar')
        const gv = window.document.getElementById('gv')
        const img = window.document.getElementById('imagem')         
        var go = window.document.getElementById('go')
        var td = window.document.getElementById('td')

        var POS = window.document.querySelector('.POS')
        var SPOS = new Audio('../../ad/POS.mp3')

        var PES = window.document.querySelector('.PES')
        var SPES = new Audio('../../ad/PES.mp3')

        var PIS = window.document.querySelector('.PIS')
        var SPIS = new Audio('../../ad/PIS.mp3')

        var PAS = window.document.querySelector('.PAS')
        var SPAS = new Audio('../../ad/PAS.mp3')

        const res = "PIS"

            botao.forEach(teste => { // possibildidade: botao.forEach(Function(teste){...})
                teste.addEventListener("click", () => {  // O "=>" é equivale a "function"
                    avancar.style.display = 'none'
                    gv.style.display = 'none'
                    const lt = teste.querySelector('.letra').innerText.trim()
                    
                    if(lt === res){
                        avancar.style.display = 'block'
                    } else{
                        gv.style.display = 'block'
                    }
                    
                    if(go.style.display == 'block' || td.style.display == 'block'){
                    avancar.style.display = 'none'
                    gv.style.display = 'none'
                }
                })
            })

                avancar.addEventListener('click', () =>{
                    avancar.style.display = 'none'
                    go.style.display = 'block'
                    go.style.backgroundColor = 'rgb(4, 233, 4)'
                    go.style.color = 'black'
                })

                gv.addEventListener('click', () =>{
                    gv.style.display = 'none'
                    td.style.display = 'block'
                    td.style.backgroundColor = 'red'
                    td.style.color = 'black'
                })

                go.addEventListener('click', function(){
                    window.location.href = 'house4.html'
                })

                td.addEventListener('click', function(){
                    window.location.href = 'gv8.html'
                })

                POS.addEventListener('mouseenter', function(){
                    SPOS.currentTime = 0
                    SPOS.play()
                })
                
                PES.addEventListener('mouseenter', function(){
                    SPES.currentTime = 0
                    SPES.play()
                })

                PIS.addEventListener('mouseenter', function(){
                    SPIS.currentTime = 0
                    SPIS.play()
                })

                PAS.addEventListener('mouseenter', function(){
                    SPAS.currentTime = 0
                    SPAS.play()
                })

            /*botao.forEach(botão1 => {
                botão1.addEventListener("click", () => {
                    avancar.style.display = "none"
                    reco.style.display = "none"
                    const lc = botão1.querySelector('.letra').innerText.trim()
                    if (lc === res){
                        avancar.style.display = "block"
                    } else{
                        reco.style.display = "block"
                    }
                })
            })*/
    </script>
</body>
</html>
