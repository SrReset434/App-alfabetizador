<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A definir</title>
    <style>


*{
    margin: 0px;
    padding: 0px;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: rgb(56, 55, 55);
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}


a{
    color: white;
    text-decoration: none;
}

a:active{
    color: white;
}

a:visited{
    color: white;
}


#cl{
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 200px;
    height: 200px;
}

.botão{
    border: 2px white solid;
    padding: 20px;
    width: 200px;
    text-align: center;
    font-size: 25px;
    border-radius: 5px;
    margin-top: 10px;
}

.botão:hover{
    background-color: red;
    cursor: pointer;
    color: black;
    scale: 0.9;
    transition: all 0.8s ease;
}

.botão:not(:hover), a:not(:hover){
    transition: all 0.8s ease;
}
    </style>
</head>
<body>
        <div id="cl">
            <a href="barco3.html">
                <div id="Play" class="botão">
                    <p>Recomeçar</p>
                </div>
            </a>
        </div>

</body>
</html>
